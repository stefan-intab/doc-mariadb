[mysqld]
bind-address = 0.0.0.0
skip-log-bin


[mariadb]
# Basic
innodb_strict_mode = ON

# Disable binlog/replication features in test unless needed
# server_id = 1
# log_bin = /var/log/mysql/intab-vm2-bin.log
# expire_logs_days = 5
# max_binlog_size = 100M
# binlog_format = mixed

# General
max_allowed_packet = 64M
net_write_timeout = 120

# Time zone
default-time-zone = SYSTEM

# MyISAM (mostly irrelevant unless you actually use MyISAM tables)
key_buffer_size = 16M

# Query cache off
query_cache_size = 0
query_cache_type = 0

# InnoDB - scaled for 2 GB RAM test server, comments are for 8 GB RAM
innodb_buffer_pool_size = 256M  # 4000M
innodb_log_buffer_size = 32M  # 256M
innodb_log_file_size = 128M  # 256M
innodb_write_io_threads = 2  # 4
innodb_read_io_threads = 2  # 4
innodb_flush_log_at_trx_commit = 1

# Connections / per-thread memory
max_connections = 30   # 150
sort_buffer_size = 2M  # 4M
thread_cache_size = 16  

# Optional: if thread pool is enabled in your MariaDB build, keep it small
thread_pool_size = 2

# Logging
general_log_file = /var/log/mysql/mysql.log
general_log = 0
log_error = /var/log/mysql/error.log

# Slow query log
slow_query_log = 0
slow_query_log_file = /var/log/mysql/mariadb-slow.log
# long_query_time = 2
